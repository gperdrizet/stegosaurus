services:
  cpu:
    build:
      context: .
      args:
        DEVICE: cpu
        TORCH_DTYPE: float32
      tags:
        - stegosaurus:${VERSION:-dev}-cpu
        - stegosaurus:latest-cpu
    image: stegosaurus:${VERSION:-dev}-cpu
    ports:
      - "8080:8080"

  gpu:
    build:
      context: .
      args:
        DEVICE: gpu
        TORCH_DTYPE: bfloat16
      tags:
        - stegosaurus:${VERSION:-dev}-gpu
        - stegosaurus:latest-gpu
    image: stegosaurus:${VERSION:-dev}-gpu
    ports:
      - "8080:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
